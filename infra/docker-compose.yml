version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: audio_platform_db
    environment:
      POSTGRES_USER: audioplatform
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: audio_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - audio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audioplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: audio_platform_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - audio_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: audio_platform_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: audioplatform
      RABBITMQ_DEFAULT_PASS: secure_password_change_me
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    networks:
      - audio_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: audio_platform_minio
    environment:
      MINIO_ROOT_USER: audioplatform
      MINIO_ROOT_PASSWORD: secure_password_change_me
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    networks:
      - audio_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend API (FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: audio_platform_backend
    environment:
      DATABASE_URL: postgresql://audioplatform:secure_password_change_me@postgres:5432/audio_platform
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://audioplatform:secure_password_change_me@rabbitmq:5672//
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: audioplatform
      MINIO_SECRET_KEY: secure_password_change_me
      MINIO_BUCKET: audio-tracks
      SECRET_KEY: change_this_secret_key_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - audio_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker for Audio Processing
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: audio_platform_celery
    environment:
      DATABASE_URL: postgresql://audioplatform:secure_password_change_me@postgres:5432/audio_platform
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://audioplatform:secure_password_change_me@rabbitmq:5672//
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: audioplatform
      MINIO_SECRET_KEY: secure_password_change_me
      MINIO_BUCKET: audio-tracks
    volumes:
      - ../backend:/app
    depends_on:
      - backend
      - rabbitmq
      - redis
      - minio
    networks:
      - audio_network
    command: celery -A app.celery worker --loglevel=info

  # Frontend (React)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api/v1
    container_name: audio_platform_frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - audio_network
    command: npm run dev -- --host

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: audio_platform_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - audio_network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: audio_platform_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - audio_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: audio_platform_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - audio_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  audio_network:
    driver: bridge
